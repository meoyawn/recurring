version: "3"

includes:
  compose:
    taskfile: ../../compose/Taskfile.yaml
    dir: ../../compose/

  openapi:
    taskfile: ../../packages/openapi/Taskfile.yaml
    dir: ../../packages/openapi/

tasks:
  run: once

  generate:client:
    run: once
    deps:
      - openapi:generate:client

  cf:types:
    run: once
    desc: Generate Cloudflare Worker binding types
    vars:
      D_TS: src/worker-configuration.d.ts
    cmds:
      - "bun wrangler types {{.D_TS}}"
    sources:
      - wrangler.toml
    generates:
      - "{{.D_TS}}"

  typecheck:
    run: once
    deps:
      - cf:types
      - generate:client
    cmd: bun tsc
    sources:
      - ../../bun.lock
      - package.json
      - tsconfig.json
      - src/**/*

  lint:
    run: once
    deps:
      - cf:types
    cmd: bun oxlint --config ../../oxlint.config.ts src/
    sources:
      - ../../bun.lock
      - ../../oxlint.config.ts
      - src/**/*

  build:
    run: once
    desc: Build production web app
    deps:
      - generate:client
    cmds:
      - bun vite build
    sources:
      - ../../bun.lock
      - ./**/*.{ts,tsx}
      - exclude: node_modules/**/*
    generates:
      - .output/**/*

  test:miniflare:
    run: once
    deps:
      - compose:up-d
      - build
    cmd: go -C ../api run ./cmd/webtestenv --cwd ../web -- bun vitest run --config vitest.miniflare.config.ts
    sources:
      - Taskfile.yaml
      - ../../bun.lock
      - src/**/*

  test:unit:
    run: once
    deps:
      - generate:client
    cmd: bun test --pass-with-no-tests --path-ignore-patterns 'src/miniflare/**'
    sources:
      - Taskfile.yaml
      - ../../bun.lock
      - src/**/*

  test:
    run: once
    deps:
      - test:unit
      - test:miniflare

  check:
    deps:
      - lint
      - typecheck
      - test

  dev:
    desc: Run Vite dev server
    deps:
      - generate:client
    cmds:
      - bun vite dev

  preview:
    desc: Preview production build
    cmds:
      - bun vite preview

  clean:
    cmds:
      - rm -rf .nitro/ .output/ dist/
