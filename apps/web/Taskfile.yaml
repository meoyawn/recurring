version: "3"

tasks:
  run: once
  cf:types:
    run: once
    desc: Generate Cloudflare Worker binding types
    cmds:
      - bun wrangler types src/worker-configuration.d.ts

  typecheck:
    run: once
    deps:
      - cf:types
    cmd: bun tsc

  lint:
    run: once
    deps:
      - cf:types
    cmd: bun oxlint --config ../../oxlint.config.ts src/

  check:
    deps:
      - lint
      - typecheck

  test:
    run: once
    cmd: bun vitest run

  build:
    desc: Build production web app
    cmds:
      - bun vite build

  dev:
    desc: Run Vite dev server
    cmds:
      - bun vite dev

  preview:
    desc: Preview production build
    cmds:
      - bun vite preview

  clean:
    cmds:
      - rm -rf .nitro/ .output/ dist/
