"$schema" = "./node_modules/wrangler/config-schema.json"
name = "recurring-web"
compatibility_date = "2026-05-04"

[env.test]

# Worker env vars are runtime bindings. Keep test Worker values here instead
# of .env.test: Wrangler local dev loads .env.<env> as secrets, and those can
# shadow [env.test.vars] before Miniflare starts.
# Sources:
# - https://developers.cloudflare.com/workers/configuration/environment-variables/
# - https://developers.cloudflare.com/workers/wrangler/system-environment-variables/
# - https://developers.cloudflare.com/workers/testing/vitest-integration/configuration/
[env.test.vars]
RECURRING_API_ORIGIN = "http://localhost:8082"
GOOGLE_AUTHORIZATION_ENDPOINT = "http://localhost:8081/authorize"
GOOGLE_TOKEN_ENDPOINT = "http://localhost:8081/token"
GOOGLE_USERINFO_ENDPOINT = "http://localhost:8081/userinfo"
GOOGLE_CLIENT_ID = "test-google-client"
GOOGLE_CLIENT_SECRET = "test-google-secret"
GOOGLE_REDIRECT_URI = ""
