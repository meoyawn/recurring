version: "3"

tasks:
  openapi:recurring:
    desc: Compile embedded OpenAPI spec
    cmds:
      - task --dir ../../packages/openapi compile:recurring
      - cp ../../packages/openapi/spec/recurring.openapi.yaml internal/httpapi/recurring.openapi.yaml
    generates:
      - internal/httpapi/recurring.openapi.yaml
    sources:
      - ../../packages/openapi/spec/*.ts

  dev:
    desc: Run API dev server
    deps:
      - openapi:recurring
    env:
      RECURRING_CONFIG: config/dev.yaml
    cmds:
      - go run ./cmd/api

  build:
    deps:
      - openapi:recurring
    vars:
      BIN: dist/recurring-api-linux-arm64
    cmds:
      - mkdir -p dist
      - CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -trimpath -ldflags "-s -w" -o {{.BIN}} ./cmd/api
    generates:
      - "{{.BIN}}"
    sources:
      - ./**/*.go
      - internal/httpapi/recurring.openapi.yaml

  migrate:local:
    desc: Run goose migrations against local Postgres
    preconditions:
      - sh: test -n "$GOOSE_DBSTRING"
        msg: set GOOSE_DBSTRING for the local Postgres database
    env:
      GOOSE_DRIVER: postgres
      GOOSE_MIGRATION_DIR: migrations
    cmds:
      - go run -tags "no_clickhouse no_libsql no_mssql no_mysql no_sqlite3 no_vertica no_ydb" github.com/pressly/goose/v3/cmd/goose -env=none up-to 1

  test:
    deps:
      - openapi:recurring
    cmds:
      - go test ./...
