version: "3"

includes:
  openapi:
    taskfile: ../../packages/openapi/Taskfile.yaml
    dir: ../../packages/openapi/
  compose:
    taskfile: ../../compose/Taskfile.yaml
    dir: ../../compose/

env:
  # Keep Go cache inside the API workspace. Codex sandbox cannot write to the
  # default user-level cache, and Go commands need a writable cache reliably.
  GOCACHE: "{{.TASKFILE_DIR}}/.cache/go-build"

tasks:
  pggen:
    run: once
    deps:
      - compose:up-d
    desc: Generate typed Postgres query wrappers
    vars:
      OUT_DIR: internal/gen/pggen/
    cmds:
      - rm -rf {{.OUT_DIR}}
      - mkdir -p {{.OUT_DIR}}
      - >-
        go tool pggen gen go
        --schema-glob 'migrations/*.sql'
        --query-glob 'queries/*.sql'
        --output-dir {{.OUT_DIR}}
        --acronym url
        --go-type bigint=int64
    generates:
      - "{{.OUT_DIR}}/**/*"
    sources:
      - "{{.TASKFILE}}"
      - migrations/*.sql
      - queries/*.sql

  dev:
    # TODO fs watching
    desc: Run API dev server
    deps:
      - openapi:generate:config-go-structs
      - openapi:generate:go-structs
      - pggen
    env:
      RECURRING_CONFIG: config/dev.yaml
    cmds:
      - go run ./cmd/api

  login:dev:
    desc: Create a local dev session and open the web origin
    deps:
      - openapi:generate:config-go-structs
      - pggen
    cmd: go run ./cmd/devlogin {{.CLI_ARGS}}

  build:
    deps:
      - openapi:generate:config-go-structs
      - openapi:generate:go-structs
      - pggen
    vars:
      BIN: dist/recurring-api-linux-arm64
      GIT_RELEASE:
        sh: git describe --tags --always --dirty
    cmds:
      - mkdir -p dist
      - CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -trimpath -ldflags "-s -w -X main.release={{default .GIT_RELEASE .RELEASE}}" -o {{.BIN}} ./cmd/api

  migrate:local:
    run: once
    desc: Run goose migrations against local Postgres
    preconditions:
      - sh: test -n "$GOOSE_DBSTRING"
        msg: set GOOSE_DBSTRING for the local Postgres database
    env:
      GOOSE_DRIVER: postgres
      GOOSE_MIGRATION_DIR: migrations
    cmds:
      - go tool goose -env=none up

  test:
    run: once
    deps:
      - openapi:generate:config-go-structs
      - openapi:generate:go-structs
      - pggen
    cmds:
      - go test ./...
    sources:
      - ./**/*

  lint:
    run: once
    deps:
      - openapi:generate:config-go-structs
      - openapi:generate:go-structs
      - pggen
    env:
      # Keep golangci-lint cache inside the API workspace. Codex sandbox cannot
      # write to the default user-level cache.
      GOLANGCI_LINT_CACHE: "{{.TASKFILE_DIR}}/.cache/golangci-lint"
    cmd: go tool golangci-lint run ./...
    sources:
      - ./**/*.go
      - .golangci.yaml
      - go.mod
      - go.sum

  check:
    run: once
    deps:
      - lint
      - test

  outdated:
    run: once
    # Go templates must be escaped because Task expands {{...}} first.
    cmd: go list -u -m -f '{{"{{"}}if and (not .Main) (not .Indirect) .Update{{"}}"}}{{"{{"}}.Path{{"}}"}} {{"{{"}}.Version{{"}}"}} => {{"{{"}}.Update.Version{{"}}"}}{{"{{"}}end{{"}}"}}' all

  tidy:
    deps:
      - pggen
    cmd: go mod tidy
