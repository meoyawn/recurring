version: "3"

tasks:
  dev:
    desc: Run API dev server
    cmds:
      - go run ./cmd/api

  build:
    vars:
      BIN: dist/recurring-api-linux-arm64
    cmds:
      - mkdir -p dist
      - CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -trimpath -ldflags "-s -w" -o {{.BIN}} ./cmd/api
    generates:
      - "{{.BIN}}"
    sources:
      - ./**/*.go
