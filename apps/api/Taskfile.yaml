version: "3"

includes:
  openapi:
    taskfile: ../../packages/openapi/Taskfile.yaml
    dir: ../../packages/openapi/

env:
  # Keep Go cache inside the API workspace. Codex sandbox cannot write to the
  # default user-level cache, and Go commands need a writable cache reliably.
  GOCACHE: "{{.TASKFILE_DIR}}/.cache/go-build"

tasks:
  openapi:recurring:
    run: once
    desc: Compile embedded OpenAPI spec
    cmds:
      - task openapi:compile:recurring
      - cp ../../packages/openapi/spec/recurring.openapi.yaml internal/httpapi/recurring.openapi.yaml
    generates:
      - internal/httpapi/recurring.openapi.yaml
    sources:
      - ../../packages/openapi/spec/*.ts

  pggen:
    run: once
    desc: Generate typed Postgres query wrappers
    cmds:
      - rm -rf internal/gen/pggen/
      - mkdir -p internal/gen/pggen/
      - go tool pggen gen go --schema-glob 'migrations/*.sql' --query-glob 'queries/*.sql' --output-dir internal/gen/pggen --acronym url
    generates:
      - internal/gen/pggen/**/*
    sources:
      - migrations/*.sql
      - queries/*.sql

  dev:
    # TODO fs watching
    desc: Run API dev server
    deps:
      - openapi:recurring
      - pggen
    env:
      RECURRING_CONFIG: config/dev.yaml
    cmds:
      - go run ./cmd/api

  build:
    deps:
      - openapi:recurring
      - pggen
    vars:
      BIN: dist/recurring-api-linux-arm64
    cmds:
      - mkdir -p dist
      - CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -trimpath -ldflags "-s -w" -o {{.BIN}} ./cmd/api
    generates:
      - "{{.BIN}}"
    sources:
      - ./**/*.go
      - internal/httpapi/recurring.openapi.yaml

  migrate:local:
    desc: Run goose migrations against local Postgres
    preconditions:
      - sh: test -n "$GOOSE_DBSTRING"
        msg: set GOOSE_DBSTRING for the local Postgres database
    env:
      GOOSE_DRIVER: postgres
      GOOSE_MIGRATION_DIR: migrations
    cmds:
      - go tool goose -env=none up

  test:
    deps:
      - openapi:recurring
      - pggen
    cmds:
      - go test ./...

  lint:
    run: once
    deps:
      - openapi:recurring
      - pggen
    env:
      # Keep golangci-lint cache inside the API workspace. Codex sandbox cannot
      # write to the default user-level cache.
      GOLANGCI_LINT_CACHE: "{{.TASKFILE_DIR}}/.cache/golangci-lint"
    cmd: go tool golangci-lint run ./...

  check:
    deps:
      - lint
      - test
