api:
  listener:
    kind: tcp
    addr: :8080

db:
  host: localhost
  port: 5432
  name: recurring
  user: recurring
  password: not-a-secret
  sslmode: disable
  max_conns: 4

sheets:
  origin: http://recurring-sheets
  transport:
    kind: unix
    path: /tmp/recurring-sheets.sock
  timeout_ms: 30000
  max_attempts: 3

telemetry:
  otlp_endpoint: http://localhost:4318
