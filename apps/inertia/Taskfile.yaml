version: 3

includes:
  compose:
    taskfile: ../../compose/Taskfile.yaml
    dir: ../../compose/

  openapi:
    taskfile: ../../packages/openapi/Taskfile.yaml
    dir: ../../packages/openapi/

tasks:
  run:
    run: once

  cf:types:
    run: once
    desc: Generate Cloudflare Worker binding types
    vars:
      WORKER_TYPES: src/worker-configuration.d.ts
    cmd: bun wrangler types {{.WORKER_TYPES}} --include-runtime=false
    sources:
      - Taskfile.yaml
      - wrangler.toml
      - ../../bun.lock
    generates:
      - "{{.WORKER_TYPES}}"

  cf:secrets:
    run: once
    desc: Verify Cloudflare Worker secret bindings exist
    cmds:
      - bun wrangler secret list --env production
      - bun wrangler secret list --env development
    sources:
      - wrangler.toml
      - ../../bun.lock

  typecheck:
    run: once
    deps:
      - openapi:generate:inertia-client
    cmd: bun tsc
    sources:
      - ../../bun.lock
      - package.json
      - tsconfig.json
      - src/**/*
      - ../shared-ts/**/*.ts
      - "*.ts"

  lint:
    run: once
    dir: ../../
    cmd: bun oxlint --config oxlint.config.ts apps/inertia/src/
    sources:
      - bun.lock
      - oxlint.config.ts
      - apps/inertia/src/**/*
      - apps/shared-ts/src/**/*

  test:miniflare:
    run: once
    desc: Run Miniflare tests; pass coverage with `task test:miniflare -- --coverage`
    deps:
      - compose:up-d
      - build
    cmd: go -C ../api run ./cmd/webtestenv --cwd ../inertia -- bun vitest run --config vitest.miniflare.config.ts {{.CLI_ARGS}}
    sources:
      - Taskfile.yaml
      - ../../bun.lock
      - ../shared-ts/**/*.ts
      - src/**/*.{ts,tsx}
      - gen/**/*.{ts,tsx}
      - vitest.miniflare.config.ts

  test:unit:
    run: once
    deps:
      - openapi:generate:inertia-client
    cmd: bun test --pass-with-no-tests --path-ignore-patterns 'src/miniflare/**'
    sources:
      - Taskfile.yaml
      - ../../bun.lock
      - src/**/*
      - ../shared-ts/**/*.ts

  test:
    run: once
    deps:
      - test:unit
      - test:miniflare

  check:
    deps:
      - cf:secrets
      - lint
      - typecheck
      - test

  build:
    run: once
    desc: Build production Inertia worker
    deps:
      - openapi:generate:inertia-client
    cmd: bun vite build
    sources:
      - ../../bun.lock
      - src/**/*.{ts,tsx}
      - gen/**/*.{ts,tsx}
      - ../shared-ts/**/*.ts
    generates:
      - dist/**/*

  dev:
    desc: Run Vite dev server
    deps:
      - openapi:generate:inertia-client
    env:
      CLOUDFLARE_ENV: development
    cmd: bun vite dev

  preview:
    desc: Preview production build
    cmd: bun vite preview

  clean:
    cmd: rm -rf dist/
