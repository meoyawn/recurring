version: "3"

tasks:
  reindex:
    cmd: uvx code-review-graph build
    sources:
      - "apps/**/*"
      - "ops/**/*"

  install:
    desc: Install Bun deps for all workspaces
    cmds:
      - bun install

  dev:web:
    desc: SolidStart dev server
    cmds:
      - cd apps/web && bun run dev

  openapi:gen:client:
    desc: Generate TypeScript client into apps/web/gen
    cmds:
      - cd packages/openapi && bun run generate:client

  openapi:gen:server-stubs:
    desc: Generate Go server stubs into apps/api/gen
    cmds:
      - cd packages/openapi && bun run generate:server-stubs

  openapi:gen:
    desc: Client + optional Go stubs
    cmds:
      - task openapi:gen:client
      - task openapi:gen:server-stubs
