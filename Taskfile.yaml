version: "3"

includes:
  compose:
    taskfile: compose/Taskfile.yaml
    dir: compose/

  web:
    taskfile: apps/web/Taskfile.yaml
    dir: apps/web/

  api:
    taskfile: apps/api/Taskfile.yaml
    dir: apps/api/

  sheets:
    taskfile: apps/sheets/Taskfile.yaml
    dir: apps/sheets/

  openapi:
    taskfile: packages/openapi/Taskfile.yaml
    dir: packages/openapi/

tasks:
  dev:compose:
    deps:
      - compose:dev

  dev:api:
    deps:
      - dev:compose
      - api:dev

  build:api:
    deps:
      - api:build

  migrate:local:api:
    deps:
      - api:migrate:local

  test:api:
    deps:
      - api:test

  dev:sheets:
    deps:
      - dev:compose
      - sheets:dev

  typecheck:sheets:
    deps:
      - sheets:typecheck

  reindex:
    desc: Rebuild code review graph; sources only skip extra Task runs
    cmd: uvx code-review-graph build
    sources:
      - "apps/**/*"
      - "packages/**/*"

  deps:bun:
    cmd: bun update --latest -i --filter "*"

  oxlint:
    cmd: bun oxlint

  nuke_node_modules:
    cmd: find . -name node_modules -type d -prune -exec rm -rf {} +
