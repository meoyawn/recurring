version: "3"

includes:
  web:
    taskfile: apps/web/Taskfile.yaml
    dir: apps/web/

  openapi:
    taskfile: packages/openapi/Taskfile.yaml
    dir: packages/openapi/

tasks:
  dev:deps:
    dir: compose
    cmds:
      - task dev

  api:dev:
    deps:
      - dev:deps
    cmds:
      - task --dir apps/api dev

  api:build:
    cmds:
      - task --dir apps/api build

  api:migrate:local:
    cmds:
      - task --dir apps/api migrate:local

  api:test:
    cmds:
      - task --dir apps/api test

  sheets:dev:
    deps:
      - dev:deps
    cmds:
      - task --dir apps/sheets dev

  sheets:typecheck:
    cmds:
      - task --dir apps/sheets typecheck

  reindex:
    desc: Rebuild code review graph; sources only skip extra Task runs
    cmd: uvx code-review-graph build
    sources:
      - "apps/**/*"
      - "packages/**/*"

  deps:bun:
    cmd: bun update --latest -i --filter "*"

  oxlint:
    cmd: bun oxlint

  nuke_node_modules:
    cmd: find . -name node_modules -type d -prune -exec rm -rf {} +
