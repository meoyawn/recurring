version: "3"

includes:
  compose:
    taskfile: compose/Taskfile.yaml
    dir: compose/

  inertia:
    taskfile: apps/inertia/Taskfile.yaml
    dir: apps/inertia/

  api:
    taskfile: apps/api/Taskfile.yaml
    dir: apps/api/

  sheets:
    taskfile: apps/sheets/Taskfile.yaml
    dir: apps/sheets/

  shared-ts:
    taskfile: apps/shared-ts/Taskfile.yaml
    dir: apps/shared-ts/

  openapi:
    taskfile: packages/openapi/Taskfile.yaml
    dir: packages/openapi/

tasks:
  lint:
    run: once
    deps:
      - api:lint
      - oxlint

  dev:api:
    deps:
      - compose:up-d
      - api:dev

  dev:sheets:
    deps:
      - compose:up-d
      - sheets:dev

  reindex:
    desc: Rebuild code review graph; sources only skip extra Task runs
    cmd: uvx code-review-graph build
    sources:
      - "apps/**/*"
      - "packages/**/*"

  deps:bun:
    cmd: bun update --latest -i --filter "*"

  oxlint:
    run: once
    cmd: bun oxlint

  nuke_node_modules:
    cmd: find . -name node_modules -type d -prune -exec rm -rf {} +

  check-impl:
    deps:
      - openapi:check
      - api:check
      - shared-ts:check
      - inertia:check
      - sheets:check

  check:
    cmds:
      - bun i
      - task: check-impl
