version: "3"

includes:
  api:
    taskfile: ./apps/api/Taskfile.yaml
    dir: apps/api/

  web:
    taskfile: ./apps/web/Taskfile.yaml
    dir: apps/web/

  openapi:
    taskfile: ./packages/openapi/Taskfile.yaml
    dir: packages/openapi/

tasks:
  reindex:
    cmd: uvx code-review-graph build
    sources:
      - "apps/**/*"
      - "ops/**/*"

  deps:bun:
    cmd: bun update --latest -i --filter "*"
