2026-05-01T20:00:00+03:00:
  where: api
  what: Choosing testcontainers-go for migration tests
  why: >-
    Can't use single postgres instance to verify different versions of schemas

2026-05-03T11:37:08+03:00:
  where: api
  what: Prefer gotest.tools/v3/assert over testify/assert when assertion failure messages matter
  why: >-
    gotest.tools reports failed expressions, variable names and types, cleaner go-cmp diffs,
    and visible whitespace in string diffs, making failures faster to diagnose

2026-05-04T15:34:19+03:00:
  where: openapi
  what: Keep OpenAPI client generation in packages/openapi
  why: >-
    Client generation uses bun and @openapitools/openapi-generator-cli, so keeping the task
    in packages/openapi avoids introducing bun into the Go API workflow

2026-05-05T14:25:17+03:00:
  where: api
  what: Ban goose down migrations while keeping explicit up annotations
  why: >-
    Production schema changes are forward-only, so migration tests reject
    -- +goose Down while every SQL migration still declares -- +goose Up explicitly
    to keep the embedded migrations as compile-time embed.FS data without runtime adaptation

2026-05-05T15:29:21+03:00:
  where: api
  what: Keep pgx v5 and patch pggen instead of downgrading the API to pgx v4
  why: >-
    pgx v5 has active fixes, merged pgtype/pgconn/pgproto3 versioning, cleaner
    null and type handling, and the current SQL injection advisory is fixed in
    v5.9.2 while pgx v4 remains affected. Upstream pggen still generates pgx v4
    code, so compatibility should come from a pggen fork upgraded to pgx v5
    rather than moving the API runtime back to pgx v4
