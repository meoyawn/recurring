version: "3"

tasks:
  typecheck:
    cmds:
      - bun tsc

  compile:recurring:
    run: once
    cmds:
      - bun spec/recurring.responsible.ts > spec/recurring.openapi.yaml

  compile:sheets:
    run: once
    cmds:
      - bun spec/sheets.responsible.ts > spec/sheets.openapi.yaml

  compile:
    deps:
      - compile:recurring
      - compile:sheets

  generate:client:
    vars:
      OUT_DIR: ../../apps/web/gen/
    deps:
      - compile:recurring
    cmds:
      - rm -rf {{.OUT_DIR}}
      - >-
        bun openapi-generator-cli
        --openapitools {{.TASKFILE_DIR}}/openapitools.json
        generate
        -c config/ts-fetch.yaml
        -i spec/recurring.openapi.yaml
        -o {{.OUT_DIR}}

  generate:go-structs:
    run: once
    vars:
      OUT_DIR: ../../apps/api/internal/gen/openapi/
      SPEC_OUT: ../../apps/api/internal/httpapi/recurring.openapi.yaml
    deps:
      - compile:recurring
    cmds:
      - rm -rf {{.OUT_DIR}}
      - cp spec/recurring.openapi.yaml {{.SPEC_OUT}}
      - >-
        bun openapi-generator-cli
        --openapitools {{.TASKFILE_DIR}}/openapitools.json
        generate
        -c config/go-structs.yaml
        -i spec/recurring.openapi.yaml
        -o {{.OUT_DIR}}

  typecheck:
    cmds:
      - bun tsc
