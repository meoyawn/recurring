version: "3"

vars:
  RECURRING_EMBEDDED_YAML: ../../apps/api/internal/httpapi/recurring.openapi.yaml
  RECURRING_CONFIG_OPENAPI_YAML: ../../apps/api/config/schema.openapi.yaml
  SHEETS_OPENAPI_YAML: ../../apps/sheets/src/sheets.openapi.yaml

tasks:
  typecheck:
    run: once
    cmd: bun tsc
    sources:
      - spec/**/*.ts

  lint:
    run: once
    cmd: bun oxlint --config ../../oxlint.config.ts spec/
    sources:
      - spec/**/*.ts

  check:
    run: once
    deps:
      - typecheck
      - lint

  compile:recurring:
    run: once
    cmds:
      - bun spec/recurring.responsible.ts > {{.RECURRING_EMBEDDED_YAML}}
    sources:
      - spec/*.responsible.ts
    generates:
      - "{{.RECURRING_EMBEDDED_YAML}}"

  compile:sheets:
    run: once
    cmd: bun spec/sheets.responsible.ts > {{.SHEETS_OPENAPI_YAML}}
    sources:
      - spec/*.responsible.ts
    generates:
      - "{{.SHEETS_OPENAPI_YAML}}"

  compile:config:
    run: once
    cmd: bun spec/recurring-config.responsible.ts > {{.RECURRING_CONFIG_OPENAPI_YAML}}
    sources:
      - spec/*.responsible.ts
    generates:
      - "{{.RECURRING_CONFIG_OPENAPI_YAML}}"

  compile:
    deps:
      - compile:recurring
      - compile:sheets
      - compile:config

  generate:client:
    run: once
    deps:
      - generate:inertia-client

  generate:inertia-client:
    run: once
    vars:
      OUT_DIR: ../../apps/inertia/gen/
    deps:
      - compile:recurring
    cmds:
      - rm -rf {{.OUT_DIR}}
      - >-
        bun openapi-generator-cli
        --openapitools {{.TASKFILE_DIR}}/openapitools.json
        generate
        -c config/ts-fetch.yaml
        -i {{.RECURRING_EMBEDDED_YAML}}
        -o {{.OUT_DIR}}
    sources:
      - "{{.RECURRING_EMBEDDED_YAML}}"
      - config/ts-fetch.yaml
      - openapitools.json
    generates:
      - "{{.OUT_DIR}}/**/*"

  generate:go-structs:
    run: once
    vars:
      OUT_DIR: ../../apps/api/internal/gen/openapi/
    deps:
      - compile:recurring
    cmds:
      - rm -rf {{.OUT_DIR}}
      - >-
        bun openapi-generator-cli
        --openapitools {{.TASKFILE_DIR}}/openapitools.json
        generate
        -c config/go-structs.yaml
        -i {{.RECURRING_EMBEDDED_YAML}}
        -o {{.OUT_DIR}}
    sources:
      - "{{.RECURRING_EMBEDDED_YAML}}"
      - config/go-structs.yaml
      - openapitools.json
    generates:
      - "{{.OUT_DIR}}/**/*"

  generate:config-go-structs:
    run: once
    vars:
      OUT_DIR: ../../apps/api/internal/gen/config/
    deps:
      - compile:config
    cmds:
      - rm -rf {{.OUT_DIR}}
      - >-
        bun openapi-generator-cli
        --openapitools {{.TASKFILE_DIR}}/openapitools.json
        generate
        -c config/go-config-structs.yaml
        -i {{.RECURRING_CONFIG_OPENAPI_YAML}}
        -o {{.OUT_DIR}}
    sources:
      - "{{.RECURRING_CONFIG_OPENAPI_YAML}}"
      - config/go-config-structs.yaml
      - openapitools.json
    generates:
      - "{{.OUT_DIR}}/**/*"

  generate:sheets-client:
    run: once
    vars:
      OUT_DIR: ../../apps/api/internal/gen/sheets/
    deps:
      - compile:sheets
    cmds:
      - rm -rf {{.OUT_DIR}}
      - >-
        bun openapi-generator-cli
        --openapitools {{.TASKFILE_DIR}}/openapitools.json
        generate
        -c config/go-client.yaml
        -i {{.SHEETS_OPENAPI_YAML}}
        -o {{.OUT_DIR}}
    sources:
      - "{{.SHEETS_OPENAPI_YAML}}"
      - config/go-client.yaml
      - openapitools.json
    generates:
      - "{{.OUT_DIR}}/**/*"
