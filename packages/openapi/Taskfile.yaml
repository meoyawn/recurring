version: "3"

tasks:
  generate:spec:
    dir: "{{.TASKFILE_DIR}}"
    cmds:
      - bun spec/recurring.responsible.ts > spec/recurring.openapi.yaml

  generate:client:
    dir: "{{.TASKFILE_DIR}}"
    cmds:
      - ./node_modules/.bin/openapi-generator-cli generate -c config/client.yaml

  generate:server-stubs:
    dir: "{{.TASKFILE_DIR}}"
    cmds:
      - ./node_modules/.bin/openapi-generator-cli generate -c config/server-stubs.yaml
