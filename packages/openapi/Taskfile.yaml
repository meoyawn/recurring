version: "3"

vars:
  RECURRING_EMBEDDED_YAML: ../../apps/api/internal/httpapi/recurring.openapi.yaml

tasks:
  typecheck:
    cmds:
      - bun tsc

  compile:recurring:
    run: once
    cmds:
      - bun spec/recurring.responsible.ts > {{.RECURRING_EMBEDDED_YAML}}
    sources:
      - spec/*.responsible.ts
    generates:
      - "{{.RECURRING_EMBEDDED_YAML}}"

  compile:sheets:
    run: once
    cmds:
      - bun spec/sheets.responsible.ts > spec/sheets.openapi.yaml

  compile:
    deps:
      - compile:recurring
      - compile:sheets

  generate:client:
    run: once
    vars:
      OUT_DIR: ../../apps/web/gen/
    deps:
      - compile:recurring
    cmds:
      - rm -rf {{.OUT_DIR}}
      - >-
        bun openapi-generator-cli
        --openapitools {{.TASKFILE_DIR}}/openapitools.json
        generate
        -c config/ts-fetch.yaml
        -i {{.RECURRING_EMBEDDED_YAML}}
        -o {{.OUT_DIR}}

  generate:go-structs:
    run: once
    vars:
      OUT_DIR: ../../apps/api/internal/gen/openapi/
    deps:
      - compile:recurring
    cmds:
      - rm -rf {{.OUT_DIR}}
      - >-
        bun openapi-generator-cli
        --openapitools {{.TASKFILE_DIR}}/openapitools.json
        generate
        -c config/go-structs.yaml
        -i {{.RECURRING_EMBEDDED_YAML}}
        -o {{.OUT_DIR}}
    sources:
      - "{{.RECURRING_EMBEDDED_YAML}}"
      - config/go-structs.yaml
      - openapitools.json
    generates:
      - "{{.OUT_DIR}}/**/*"

  typecheck:
    cmds:
      - bun tsc
